name: 🚀 InteractHub CI/CD

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:

# ================= BACKEND =================
  backend:
    name: 🔧 Build, Test & Deploy Backend (.NET)
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout source
      uses: actions/checkout@v4

    # Cache NuGet
    - name: ⚡ Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 📦 Restore dependencies
      run: dotnet restore

    - name: 🏗 Build project
      run: dotnet build --no-restore --configuration Release

    - name: 🧪 Run unit tests
      run: dotnet test --no-build --verbosity normal

    - name: 📤 Publish app
      run: dotnet publish InteractHub.API/InteractHub.API.csproj -c Release -o ./backend_publish

    # 👉 CHỈ DEPLOY KHI PUSH VÀO MASTER
    - name: ☁️ Deploy Backend to Azure
      if: github.ref == 'refs/heads/master'
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'interacthub-api'
        publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        package: ./backend_publish


# ================= FRONTEND =================
  frontend:
    name: 🌐 Build & Deploy Frontend (React)
    runs-on: ubuntu-latest
    needs: backend

    steps:
    - name: 📥 Checkout source
      uses: actions/checkout@v4

    # Cache npm
    - name: ⚡ Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('InteractHub.Client/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      run: |
        cd InteractHub.Client
        npm ci

    - name: 🏗 Build project
      run: |
        cd InteractHub.Client
        npm run build

    # 👉 CHỈ DEPLOY KHI PUSH MASTER
    - name: ☁️ Deploy Frontend to Azure Static Web App
      if: github.ref == 'refs/heads/master'
      uses: azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_FRONTEND_TOKEN }}
        action: "upload"
        app_location: "InteractHub.Client"
        output_location: "dist"